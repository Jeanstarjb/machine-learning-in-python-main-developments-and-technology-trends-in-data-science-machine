apiVersion: batch/v1
kind: Job
metadata:
  name: training-job
  labels:
    app: ml-platform
spec:
  template:
    metadata:
      labels:
        app: ml-platform
    spec:
      containers:
      - name: training-container
        image: ml-service:latest
        command: ["python", "-m", "ml_service.training"]
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_REGION
          value: "us-east-1"
        - name: S3_BUCKET_NAME
          value: "your_s3_bucket_name"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
      restartPolicy: Never
  backoffLimit: 4